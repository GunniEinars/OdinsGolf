name: Build OdinsGolf APK

# Builds a debug APK in the cloud so you never need a local Android toolchain.
# Trigger: every push, or manually from the Actions tab ("Run workflow").
# Download the result from the run page -> Artifacts -> "OdinsGolf-debug-apk".

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (provisions gradle, no wrapper jar needed)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OdinsGolf-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
