name: Build OdinsGolf APK

# Builds a debug APK in the cloud so you never need a local Android toolchain.
# Trigger: every push, or manually from the Actions tab ("Run workflow").
# Download the result from the run page -> Artifacts -> "OdinsGolf-debug-apk".

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # allows the one-time keystore commit below
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Stable signing: generate ONE debug keystore and commit it to the repo
      # (one time only). Every build afterwards — cloud or local — signs with the
      # same key, so the watch updates in place with `adb install -r`. A debug
      # keystore is not a secret (Android's default debug key is public).
      - name: Ensure committed debug keystore
        run: |
          if [ ! -f app/odins-debug.keystore ]; then
            keytool -genkeypair -v -keystore app/odins-debug.keystore \
              -storepass odinsgolf -keypass odinsgolf -alias odinsgolf \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=OdinsGolf, O=OdinsGolf, C=IS"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f app/odins-debug.keystore
            git commit -m "ci: add stable debug keystore [skip ci]"
            git push origin HEAD:main
          fi

      - name: Set up Gradle (provisions gradle, no wrapper jar needed)
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Gradle wrapper jar
        run: gradle wrapper --gradle-version 8.9

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log

      - name: Run unit tests
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --stacktrace 2>&1 | tee -a build.log

      - name: Surface build errors to summary
        if: failure()
        run: |
          {
            echo '### Build failed — key error lines'
            echo '```'
            grep -E '^e: |FAILURE:|What went wrong|> Task .*FAILED|error:' build.log | head -60 || tail -80 build.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OdinsGolf-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
